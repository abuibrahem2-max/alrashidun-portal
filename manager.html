    const DEFAULT_PLAN_LABELS = {

    };

    const ConnectionStatus = () => {
        const [online, setOnline] = useState(navigator.onLine);
        useEffect(() => {
            const setStatus = () => setOnline(navigator.onLine);
            window.addEventListener('online', setStatus);
            window.addEventListener('offline', setStatus);
            return () => {
                window.removeEventListener('online', setStatus);
                window.removeEventListener('offline', setStatus);
            };
        }, []);

        return (
            <div className={`fixed bottom-3 left-3 z-[100] px-3 py-1.5 rounded-full shadow-lg flex items-center gap-2 text-xs font-bold transition-colors no-print ${online ? 'bg-emerald-100 text-emerald-700 border border-emerald-200' : 'bg-red-100 text-red-700 border border-red-200'}`}>
                <div className={`w-2 h-2 rounded-full ${online ? 'bg-emerald-500 animate-pulse' : 'bg-red-500'}`}></div>
                {online ? 'متصل بالسحابة' : 'غير متصل'}
            </div>
        );
    };

    const ChartsSection = ({ plans, isPrintMode = false }) => {
        const canvasRef = useRef(null);
        useEffect(() => {
            if (!plans || plans.length === 0) return;
            let completed = 0, inProgress = 0, pending = 0;
            plans.forEach(p => p.procedures?.forEach(pr => {
                if(pr.status === 'completed') completed++;
                else if(pr.status === 'in_progress') inProgress++;
                else pending++;
            }));
            if(canvasRef.current) {
                if(window.myChart) window.myChart.destroy();
                const ctx = canvasRef.current.getContext('2d');
                const existingChart = Chart.getChart(canvasRef.current);
                if (existingChart) existingChart.destroy();

                new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: ['منجز', 'جاري', 'لم يبدأ'],
                        datasets: [{ data: [completed, inProgress, pending], backgroundColor: ['#10b981', '#3b82f6', '#f43f5e'], borderWidth: 0 }]
                    },
                    options: { 
                        responsive: true, 
                        maintainAspectRatio: false, 
                        plugins: { 
                            legend: { 
                                position: isPrintMode ? 'bottom' : 'right', 
                                labels: { font: { family: 'Tajawal', size: isPrintMode ? 10 : 12 } } 
                            } 
                        } 
                    }
                });
            }
        }, [plans, isPrintMode]);
        
        return (
            <div className={`bg-white dark:bg-dark-800 p-4 rounded-2xl shadow-sm border border-slate-200 dark:border-dark-700 flex items-center justify-center chart-container ${isPrintMode ? 'h-full w-full border-none shadow-none p-0' : 'h-40'}`}>

        );

        </div>
    );

    const EditableText = ({ value, onChange, placeholder, type="text", className="" }) => {
        const [isEditing, setIsEditing] = useState(false);
        const [val, setVal] = useState(value);
        useEffect(() => setVal(value), [value]);
        const handleBlur = () => { if(val !== value) onChange(val); setIsEditing(false); };
        
        const handleClick = (e) => {
            e.stopPropagation();
            setIsEditing(true);
        };

        if(isEditing) return <input autoFocus type={type} className={`w-full bg-white dark:bg-dark-800 border rounded p-1 outline-none ${className ? className : 'text-xs'}`} value={val} onChange={e => setVal(e.target.value)} onBlur={handleBlur} onKeyDown={e => { if(e.key === 'Enter') handleBlur(); }} onClick={e=>e.stopPropagation()} />;
        return <div onClick={handleClick} className={`cursor-text hover:bg-gray-100 dark:hover:bg-dark-700 rounded px-1 transition-colors ${className ? className : 'min-h-[20px]'}`}>{val || <span className="text-gray-400 italic">{placeholder}</span>}</div>;
    };

    const WitnessCell = ({ link, onChange }) => {
        const [isEditing, setIsEditing] = useState(false);
        const [val, setVal] = useState(link || '');
        const [qrImage, setQrImage] = useState(null);
        useEffect(() => setVal(link || ''), [link]);
        useEffect(() => { if (val && window.QRious) { try { const qr = new window.QRious({ value: val, size: 150, level: 'H' }); setQrImage(qr.toDataURL()); } catch (e) { setQrImage(null); } } else { setQrImage(null); } }, [val]);

    const BMICalculator = ({ isOpen, onClose }) => {
        const [w, setW] = useState('');

        const [res, setRes] = useState(null);
        if(!isOpen) return null;
        const calc = () => {
            if(!w || !h) return;
            const hm = h / 100;
            const bmi = (w / (hm * hm)).toFixed(1);
            let status = '';
            if(bmi < 18.5) status = 'نحافة';
            else if(bmi < 25) status = 'وزن طبيعي';
            else if(bmi < 30) status = 'زيادة وزن';
            else status = 'سمنة';
            setRes({bmi, status});
        };
        return (
            <div className="fixed inset-0 bg-black/60 z-[3000] flex items-center justify-center p-4 backdrop-blur-sm no-print" onClick={onClose}>

    const StudentsDB = ({ students, onSaveStudents, showToast }) => {
        const fileRef = useRef(null);
        const [searchTerm, setSearchTerm] = useState('');

        const handleFileUpload = (e) => {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (evt) => {
                const bstr = evt.target.result;
                const wb = XLSX.read(bstr, {type:'binary'});
                const wsname = wb.SheetNames[0];
                const ws = wb.Sheets[wsname];
                const data = XLSX.utils.sheet_to_json(ws, {header: 1});
                
                const newStudents = data.slice(1).map((row, idx) => ({
                    id: Date.now() + idx,
                    name: row[0] || '',        
                    grade: row[1] || '',       
                    phone: row[2] || '',       
                    nationalId: row[3] || '', 
                    nationality: row[4] || '',
                    address: row[5] || ''      
                })).filter(s => s.name);

                if(newStudents.length > 0) {
                    if (confirm(`تم العثور على ${newStudents.length} طالب.\n\n[موافق] = استبدال\n[إلغاء] = دمج`)) {
                        onSaveStudents(newStudents);
                    } else {
                        onSaveStudents([...students, ...newStudents]);
                    }
                    showToast('تم استيراد الطلاب بنجاح', 'success');
                }
            };
            reader.readAsBinaryString(file);
        };

        const exportDB = async () => {
            const workbook = new ExcelJS.Workbook();
            const sheet = workbook.addWorksheet('الطلاب', { views: [{ rightToLeft: true }] });
            sheet.columns = [ 
                { header: 'الاسم', key: 'n', width: 30 }, 
                { header: 'الصف', key: 'g', width: 10 }, 
                { header: 'الجوال', key: 'p', width: 15 }, 
                { header: 'السجل', key: 'id', width: 15 },
                { header: 'الجنسية', key: 'nat', width: 15 },
                { header: 'العنوان', key: 'addr', width: 30 }
            ];
            students.forEach(s => sheet.addRow({ n: s.name, g: s.grade, p: s.phone, id: s.nationalId, nat: s.nationality, addr: s.address }));
            const buf = await workbook.xlsx.writeBuffer();
            saveAs(new Blob([buf]), `قاعدة_الطلاب.xlsx`);
        };

        const filtered = students.filter(s => s.name.includes(searchTerm));

        return (
            <div className="space-y-6 fade-in no-print">
                <div className="bg-white dark:bg-dark-800 p-6 rounded-2xl shadow-sm border border-slate-200 dark:border-dark-700">
                    <div className="flex flex-col md:flex-row justify-between items-center mb-4 gap-4">
                        <h3 className="font-bold text-lg dark:text-white flex items-center gap-2"><Icons.Users /> قاعدة بيانات الطلاب</h3>
                        <div className="flex gap-2">
                             <button onClick={exportDB} className="bg-slate-500 text-white px-3 py-2 rounded-lg font-bold hover:bg-slate-600 flex items-center gap-2 text-sm"><Icons.FileText size={16} /> تحميل نسخة</button>
                             <button onClick={() => fileRef.current.click()} className="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold hover:bg-blue-700 flex items-center gap-2">
                                <Icons.Upload size={18} /> استيراد / استبدال
                            </button>
                        </div>
                        <input type="file" ref={fileRef} onChange={handleFileUpload} className="hidden" accept=".xlsx, .xls" />
                    </div>
                    <p className="text-sm text-red-500 mb-2 font-bold">ترتيب ملف الإكسل: الاسم (A)، الصف (B)، الجوال (C)، السجل (D)، الجنسية (E)، العنوان (F).</p>
                    <input type="text" placeholder="بحث عن طالب..." className="w-full p-2 border rounded mb-4 dark:bg-dark-900 dark:text-white" value={searchTerm} onChange={e=>setSearchTerm(e.target.value)} />

                    <div className="overflow-x-auto max-h-96">
                        <table className="w-full text-right text-sm print-borders">
                            <thead className="bg-gray-100 dark:bg-dark-900 font-bold sticky top-0">
                                <tr>
                                    <th className="p-3">الاسم</th><th className="p-3">الصف</th><th className="p-3">رقم الجوال</th><th className="p-3">السجل المدني</th><th className="p-3">تحكم</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-gray-200 dark:divide-dark-700">
                                {filtered.map(s => (
                                    <tr key={s.id}>
                                        <td className="p-2 dark:text-white font-bold">{s.name}</td>
                                        <td className="p-2 dark:text-gray-300">{s.grade}</td>
                                        <td className="p-2 dark:text-gray-300">{s.phone}</td>
                                        <td className="p-2 dark:text-gray-300">{s.nationalId || '-'}</td>
                                        <td className="p-2"><button onClick={() => { if(confirm('حذف؟')) onSaveStudents(students.filter(x=>x.id !== s.id)); }} className="text-red-500"><Icons.Trash size={16}/></button></td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        );
    };

    const HealthClinicView = ({ records, studentsDB, onSaveRecord, onUpdateRecord, onDeleteRecord, onOpenReferral, onOpenBMI, showToast }) => {
        const [newRec, setNewRec] = useState({ date: '', time: '', name: '', grade: '', diagnosis: '', action: '', phone: '' });
        const [searchTerm, setSearchTerm] = useState('');
        const [selectedStudent, setSelectedStudent] = useState(null);
        
        useEffect(() => {
            const now = new Date();
            setNewRec(prev => ({ 
                ...prev, 
                date: now.toISOString().split('T')[0], 
                time: now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' }) 
            }));
        }, [records]);

        const handleNameChange = (e) => {
            const val = e.target.value;
            const found = studentsDB.find(s => s.name && s.name.trim() === val.trim());
            if(found) {
                let g = found.grade ? String(found.grade).trim() : '';
                let p = found.phone ? String(found.phone).trim() : '';
                if (g.length > 5 && (g.startsWith('966') || g.startsWith('05'))) {
                    const temp = g; g = p; p = temp;
                }
                setNewRec(prev => ({...prev, name: found.name, grade: g, phone: p}));
            } else {
                setNewRec(prev => ({...prev, name: val}));
            }
        };

        const handleSave = () => {
            if(!newRec.name) return showToast("الاسم مطلوب", "error");
            const now = new Date();
            onSaveRecord({ 
                ...newRec, 
                date: newRec.date || now.toISOString().split('T')[0], 
                time: newRec.time || now.toLocaleTimeString('en-GB', {hour:'2-digit',minute:'2-digit'}), 
                id: Date.now() 
            });
            showToast("تم تسجيل الحالة بنجاح", "success");
            setNewRec({ 
                date: now.toISOString().split('T')[0], 
                time: now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' }), 
                name: '', 
                grade: '', 
                diagnosis: '', 
                action: '', 
                phone: '' 
            });
        };

        const exportExcel = async () => {
            const workbook = new ExcelJS.Workbook();
            const sheet = workbook.addWorksheet('سجل العيادة', { views: [{ rightToLeft: true }] });
            sheet.columns = [ { header: 'التاريخ', key: 'd', width: 12 }, { header: 'الوقت', key: 't', width: 10 }, { header: 'الاسم', key: 'n', width: 30 }, { header: 'الصف', key: 'g', width: 10 }, { header: 'التشخيص', key: 'diag', width: 30 }, { header: 'الإجراء', key: 'act', width: 30 }, { header: 'الجوال', key: 'p', width: 15 } ];
            sheet.getRow(1).eachCell(cell => { cell.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FF10B981'}}; cell.font={color:{argb:'FFFFFFFF'},bold:true}; cell.alignment={horizontal:'center'}; });
            records.forEach(r => sheet.addRow({ d: r.date, t: r.time, n: r.name, g: r.grade, diag: r.diagnosis, act: r.action, p: r.phone }));
            const buf = await workbook.xlsx.writeBuffer();
            saveAs(new Blob([buf]), `سجل_العيادة.xlsx`);
        };

        const filtered = records.filter(r => r.name.includes(searchTerm));

        return (
            <div className="space-y-6 fade-in">
                <div className="bg-white dark:bg-dark-800 p-4 rounded-xl shadow-sm border border-slate-200 dark:border-dark-700 no-print">
                    <div className="grid grid-cols-2 md:grid-cols-8 gap-3">
                        <input type="date" className="p-2 border rounded dark:bg-dark-900 dark:text-white" value={newRec.date} onChange={e=>setNewRec({...newRec, date: e.target.value})} />
                        <input type="time" className="p-2 border rounded dark:bg-dark-900 dark:text-white" value={newRec.time} onChange={e=>setNewRec({...newRec, time: e.target.value})} />
                        
                        <div className="col-span-2">
                            <input list="students_list" type="text" className="p-2 border rounded w-full dark:bg-dark-900 dark:text-white" placeholder="اسم الطالب" value={newRec.name} onChange={handleNameChange} />
                            <datalist id="students_list">{studentsDB.map(s=><option key={s.id} value={s.name} />)}</datalist>
                        </div>

                        <input type="text" className="p-2 border rounded dark:bg-dark-900 dark:text-white" placeholder="رقم ولي الأمر" value={newRec.phone} onChange={e=>setNewRec({...newRec, phone: e.target.value})} />
                        <input type="text" className="p-2 border rounded dark:bg-dark-900 dark:text-white" placeholder="التشخيص" value={newRec.diagnosis} onChange={e=>setNewRec({...newRec, diagnosis: e.target.value})} />
                        <input type="text" className="p-2 border rounded w-full dark:bg-dark-900 dark:text-white" placeholder="الإجراء" value={newRec.action} onChange={e=>setNewRec({...newRec, action: e.target.value})} />
                        
                        <div className="flex gap-1">
                            <button onClick={handleSave} className="bg-emerald-600 text-white p-2 rounded"><Icons.Plus /></button>
                            <input type="text" className="p-2 border rounded w-full dark:bg-dark-900 dark:text-white text-center" placeholder="الصف" value={newRec.grade} onChange={e=>setNewRec({...newRec, grade: e.target.value})} />
                        </div>
                    </div>
                </div>

                <div className="flex justify-between gap-2 no-print">
                    <div className="relative flex-1">
                        <input type="text" placeholder="بحث..." className="w-full p-2 border rounded dark:bg-dark-900 dark:text-white" value={searchTerm} onChange={e=>setSearchTerm(e.target.value)} />
                    </div>
                    <button onClick={exportExcel} className="bg-green-600 text-white px-3 py-2 rounded text-sm font-bold flex gap-1 items-center"><Icons.FileText size={16}/> Excel</button>
                    <button onClick={onOpenBMI} className="bg-blue-600 text-white px-3 py-2 rounded text-sm font-bold flex gap-1 items-center"><Icons.Scale size={16}/> BMI</button>
                </div>

                <div className="bg-white dark:bg-dark-800 rounded-xl shadow-sm overflow-x-auto">
                    <table className="w-full text-right text-sm print-borders">
                        <thead className="bg-emerald-50 dark:bg-emerald-900/20 text-emerald-900 dark:text-emerald-100 font-bold">
                            <tr><th>التاريخ</th><th>الوقت</th><th>الاسم</th><th>الصف</th><th>التشخيص</th><th>الإجراء</th><th>جوال ولي الأمر</th><th className="no-print">أدوات</th></tr>
                        </thead>
                        <tbody className="divide-y divide-gray-100 dark:divide-dark-700">
                            {filtered.map(r => {
                                const phoneStr = r.phone ? String(r.phone).trim() : '';
                                let waNumber = phoneStr;
                                if (waNumber.startsWith('966')) waNumber = waNumber.substring(3);
                                if (waNumber.startsWith('0')) waNumber = waNumber.substring(1);

                                return (
                                <tr key={r.id}>
                                    <td className="p-3 dark:text-gray-300 align-middle"><EditableText value={r.date} onChange={v=>onUpdateRecord(r.id, 'date', v)} type="date" /></td>
                                    <td className="p-3 dark:text-gray-300 align-middle"><EditableText value={r.time} onChange={v=>onUpdateRecord(r.id, 'time', v)} type="time" /></td>
                                    <td className="p-3 font-bold dark:text-white cursor-pointer hover:text-blue-500 align-middle" onClick={()=>setSelectedStudent(r.name)}>{r.name}</td>
                                    <td className="p-3 align-middle"><EditableText value={r.grade} onChange={v=>onUpdateRecord(r.id, 'grade', v)} /></td>
                                    <td className="p-3 text-red-600 align-middle"><EditableText value={r.diagnosis} onChange={v=>onUpdateRecord(r.id, 'diagnosis', v)} /></td>
                                    <td className="p-3 text-emerald-700 align-middle"><EditableText value={r.action} onChange={v=>onUpdateRecord(r.id, 'action', v)} /></td>
                                    <td className="p-3 font-bold text-gray-600 dark:text-gray-400 align-middle">
                                        <div className="flex items-center gap-2 justify-center w-full h-full">
                                            <div className="flex-1 text-center"><EditableText value={phoneStr} onChange={v=>onUpdateRecord(r.id, 'phone', v)} /></div>
                                            {phoneStr && <a href={`https://wa.me/966${waNumber}`} target="_blank" className="text-green-500 hover:scale-110 transition-transform no-print" title="مراسلة واتساب"><Icons.Whatsapp size={18}/></a>}
                                        </div>
                                    </td>
                                    <td className="p-3 flex gap-2 no-print align-middle">
                                        <button onClick={()=>{
                                            // طلب تحديد الوجهة قبل الطباعة
                                            const isMuhayil = confirm("حدد وجهة التحويل:\n\n[موافق] = مستشفى محايل العام\n[إلغاء] = مركز صحي ترقش");
                                            const dest = isMuhayil ? 'مستشفى محايل العام' : 'مركز صحي ترقش';

                                            const studentInfo = studentsDB.find(s=>s.name===r.name);
                                            onOpenReferral({
                                                name: r.name, 
                                                grade: r.grade, 
                                                nationalId: studentInfo?.nationalId, 
                                                nationality: studentInfo?.nationality,
                                                address: studentInfo?.address,
                                                destination: dest
                                            });
                                        }} className="text-blue-500 hover:bg-blue-50 p-1 rounded" title="طباعة إحالة"><Icons.Hospital size={18} /></button>
                                        <button onClick={()=>onDeleteRecord(r.id)} className="text-red-500 hover:bg-red-50 p-1 rounded"><Icons.Trash size={18} /></button>
                                    </td>
                                </tr>
                            )})}
                        </tbody>
                    </table>
                </div>
            </div>
        );
    };

    const App = () => {
        const [modules, setModules] = useState(INITIAL_MODULES);
        const [activeModule, setActiveModule] = useState(INITIAL_MODULES[0].id);
        const [darkMode, setDarkMode] = useState(false);
        const [logos, setLogos] = useState({ vision: null, ministry: null, seal: null });
        const [dataStore, setDataStore] = useState({});
        const [bmiOpen, setBmiOpen] = useState(false);
        const [referralData, setReferralData] = useState(null);
        const [planModalOpen, setPlanModalOpen] = useState(false);
        const [planLabels, setPlanLabels] = useState(DEFAULT_PLAN_LABELS);
        const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
        const [toast, setToast] = useState(null);

        const showToast = (message, type = 'success') => {
            setToast({ message, type });
            setTimeout(() => setToast(null), 3000);
        };

        useEffect(() => {
            if (referralData) {
                document.title = `إحالة طبية - ${referralData.name}`;
            } else {
                const currentModule = modules.find(m => m.id === activeModule);
                if (currentModule) {
                    document.title = `نظام الراشدون - ${currentModule.name}`;
                }
            }
        }, [activeModule, modules, referralData]);

        useEffect(() => {
            if(darkMode) document.documentElement.classList.add('dark'); else document.documentElement.classList.remove('dark');
            const unsubSettings = db.collection('school_data').doc('settings').onSnapshot(d => {
                if(d.exists) {
                    const data = d.data();
                    setLogos(data);
                    if(data.moduleNames) {
                        setModules(prev => prev.map(m => ({
                            ...m,
                            name: data.moduleNames[m.id] || m.name
                        })));
                    }
                    if(data.planLabels) {
                        setPlanLabels(data.planLabels);
                    }
                }
            });
            
            const unsubs = modules.map(m => db.collection('school_data').doc(m.id).onSnapshot(d => {
                if(d.exists && d.data().data) {
                    setDataStore(prev => ({ ...prev, [m.id]: d.data().data }));
                } else if (m.id === 'gifted_plan') {
                    setDataStore(prev => ({ ...prev, [m.id]: GIFTED_PLAN_DATA }));
                    db.collection('school_data').doc('gifted_plan').set({ data: GIFTED_PLAN_DATA });
                } else {
                    setDataStore(prev => ({ ...prev, [m.id]: [] }));
                }
            }));
            return () => { unsubSettings(); unsubs.forEach(u => u()); };
        }, [darkMode]);

        const saveData = (col, data) => db.collection('school_data').doc(col).set({ data });

        const saveModuleTitles = () => {
            const names = {};
            modules.forEach(m => names[m.id] = m.name);
            db.collection('school_data').doc('settings').set({ moduleNames: names, planLabels: planLabels }, { merge: true });
            showToast('تم حفظ المسميات الجديدة بنجاح', 'success');
        };

        const clearClinicData = () => {
            if(confirm('⚠️ تحذير: هل أنت متأكد من مسح جميع سجلات العيادة؟')) {
                saveData('health_record_final_v7', []);
                showToast('تم مسح السجلات بنجاح', 'success');
            }
        };

        const clearStudentsData = () => {
            if(confirm('⚠️ تحذير: هل أنت متأكد من مسح قاعدة بيانات الطلاب؟')) {
                saveData('students_db', []);
                showToast('تم مسح قاعدة الطلاب بنجاح', 'success');
            }
        };

        const savePlan = (data) => {
            const currentPlans = dataStore[activeModule] || [];
            const updated = [...currentPlans, { id: Date.now(), ...data, procedures: [], progress: 0 }];
            saveData(activeModule, updated);
            setPlanModalOpen(false);
            showToast('تم إضافة الهدف بنجاح', 'success');
        };

        const updatePlan = (id, field, val) => {
            const updatedPlans = (dataStore[activeModule] || []).map(p =>
                p.id === id ? { ...p, [field]: val } : p
            );
            saveData(activeModule, updatedPlans);
        };

        const updateProc = (pid, procId, field, val) => {
            const updatedPlans = (dataStore[activeModule] || []).map(p => {
                if (p.id !== pid) return p;
                const updatedProcs = p.procedures.map(pr => pr.id === procId ? { ...pr, [field]: val } : pr);
                const completed = updatedProcs.filter(x => x.status === 'completed').length;
                const prog = updatedProcs.length > 0 ? Math.round((completed / updatedProcs.length) * 100) : 0;
                return { ...p, procedures: updatedProcs, progress: prog };
            });
            saveData(activeModule, updatedPlans);
        };

        const updateClinicRecord = (id, field, val) => {
             const updatedRecords = (dataStore['health_record_final_v7'] || []).map(r =>
                 r.id === id ? { ...r, [field]: val } : r
             );
             saveData('health_record_final_v7', updatedRecords);
        };

        const toggleProcStatus = (pid, procId) => {
            const updatedPlans = (dataStore[activeModule] || []).map(p => {
                if (p.id !== pid) return p;
                const updatedProcs = p.procedures.map(pr => {
                    if (pr.id !== procId) return pr;
                    const nextStatus = pr.status === 'pending' ? 'in_progress' : pr.status === 'in_progress' ? 'completed' : 'pending';
                    return { ...pr, status: nextStatus };
                });
                const completed = updatedProcs.filter(x => x.status === 'completed').length;
                const prog = updatedProcs.length > 0 ? Math.round((completed / updatedProcs.length) * 100) : 0;
                return { ...p, procedures: updatedProcs, progress: prog };
            });
            saveData(activeModule, updatedPlans);
        };

        const deleteProc = (pid, procId) => {
            if(!confirm("حذف الإجراء؟")) return;
            const updatedPlans = (dataStore[activeModule] || []).map(p => {
                if (p.id !== pid) return p;
                const updatedProcs = p.procedures.filter(pr => pr.id !== procId);
                const completed = updatedProcs.filter(x => x.status === 'completed').length;
                const prog = updatedProcs.length > 0 ? Math.round((completed / updatedProcs.length) * 100) : 0;
                return { ...p, procedures: updatedProcs, progress: prog };
            });
            saveData(activeModule, updatedPlans);
        };

        const addProc = (pid) => {
            const t = prompt(planLabels.procedure + ":");
            if(t) {
                const updatedPlans = (dataStore[activeModule] || []).map(p => p.id === pid ? { ...p, procedures: [...(p.procedures||[]), { id: Date.now(), text: t, responsible: '-', deadline: '-', status: 'pending', witnessLink: '' }] } : p);
                saveData(activeModule, updatedPlans);
                showToast('تم إضافة الإجراء', 'success');
            }
        };

        const deletePlan = (id) => { if(confirm("حذف الهدف بالكامل؟")) saveData(activeModule, (dataStore[activeModule] || []).filter(p => p.id !== id)); };

        useEffect(() => {
            if (referralData) {
                document.body.classList.add('printing-referral');
                setTimeout(() => { window.print(); setReferralData(null); document.body.classList.remove('printing-referral'); }, 500);
            }
        }, [referralData]);

        const stats = useMemo(() => {
            let t=0, c=0, inp=0, pend=0;
            const plans = dataStore[activeModule] || [];
            
            if(activeModule === 'health_record_final_v7' || activeModule === 'students_db' || activeModule === 'sites_links') return null;
            
            plans.forEach(p => p.procedures?.forEach(pr => {
                t++;
                if(pr.status === 'completed') c++;
                else if(pr.status === 'in_progress') inp++;
                else pend++;
            }));
            
            return { total: t, done: c, inProgress: inp, pending: pend, percent: t ? Math.round((c/t)*100) : 0 };
        }, [dataStore, activeModule]);

        const getProgressColor = (p) => {
            if(p >= 100) return 'text-emerald-600';
            if(p >= 75) return 'text-blue-600';
            if(p >= 25) return 'text-orange-500';
            return 'text-red-500';
        };

        const DashboardCard = ({ title, value, gradient, icon: IconComp }) => (
            <div className={`p-5 rounded-2xl shadow-lg text-white flex items-center justify-between transform hover:scale-102 transition-transform duration-300 ${gradient} dark:opacity-90`}>
                <div><p className="text-white/80 text-xs font-bold mb-1">{title}</p><h4 className="text-4xl font-black">{value}</h4></div>
                <div className="p-3 rounded-xl bg-white/20 backdrop-blur-sm"><IconComp size={28} /></div>
            </div>
        );

        const isHealth = activeModule === 'health_guide_plan' || activeModule === 'health_record_final_v7' || activeModule === 'gifted_plan';

        return (
            <div className="flex min-h-screen bg-slate-50 main-layout relative">
                {toast && <Toast message={toast.message} type={toast.type} />}
                
                <ConnectionStatus />

                {mobileMenuOpen && (
                    <div className="fixed inset-0 z-50 bg-slate-900/90 backdrop-blur-sm flex flex-col p-4 no-print" onClick={() => setMobileMenuOpen(false)}>
                        <div className="flex justify-between items-center mb-8 text-white border-b border-slate-700 pb-4">
                            <h2 className="text-2xl font-bold">الراشدون</h2>
                            <button onClick={() => setMobileMenuOpen(false)} className="bg-slate-800 p-2 rounded-full"><Icons.X /></button>
                        </div>
                        <nav className="flex-1 overflow-y-auto space-y-2">
                            {modules.map(m => {
                                const Ico = Icons[m.icon];
                                return <button key={m.id} onClick={(e) => { e.stopPropagation(); setActiveModule(m.id); setMobileMenuOpen(false); }} className={`w-full flex items-center gap-4 px-4 py-4 rounded-xl font-bold text-lg transition-all ${activeModule === m.id ? 'bg-emerald-600 text-white' : 'text-slate-400 hover:bg-slate-800'}`}><Ico size={24}/> {m.name}</button>;
                            })}
                            <button onClick={(e) => { e.stopPropagation(); setActiveModule('settings'); setMobileMenuOpen(false); }} className={`w-full flex items-center gap-4 px-4 py-4 rounded-xl font-bold text-lg text-slate-400 hover:bg-slate-800`}><Icons.Settings size={24}/> الإعدادات</button>
                        </nav>
                    </div>
                )}

                <BMICalculator isOpen={bmiOpen} onClose={()=>setBmiOpen(false)} />
                <ReferralForm data={referralData} logos={logos} destination={referralData?.destination} />
                <PlanModal isOpen={planModalOpen} onClose={() => setPlanModalOpen(false)} onSave={savePlan} labels={planLabels} />

                <aside className="fixed inset-y-0 right-0 bg-slate-900 dark:bg-dark-800 text-white w-64 z-40 hidden md:flex flex-col no-print">
                    <div className="p-6 border-b border-slate-800"><h1 className="text-xl font-bold">الراشدون</h1><p className="text-slate-400 text-xs">نظام الموجه الصحي</p></div>
                    <nav className="flex-1 p-4 space-y-2 overflow-y-auto">
                        {modules.map(m => {
                            const Ico = Icons[m.icon];
                            return <button key={m.id} onClick={()=>setActiveModule(m.id)} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold transition-all ${activeModule===m.id ? 'bg-emerald-600' : 'hover:bg-slate-800 text-slate-400'}`}><Ico size={20}/> {m.name}</button>;
                        })}
                        <button onClick={()=>setActiveModule('settings')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-slate-400 hover:bg-slate-800`}><Icons.Settings size={20}/> الإعدادات</button>
                    </nav>
                    <div className="p-4"><button onClick={()=>setDarkMode(!darkMode)} className="flex items-center gap-2 text-slate-400 text-xs font-bold"><Icons.Moon size={16}/> الوضع الليلي</button></div>
                </aside>

                <main className="flex-1 p-4 md:p-8 md:mr-64 main-content w-full">
                    {activeModule !== 'settings' && (
                        <CoverPage 
                            moduleName={modules.find(m => m.id === activeModule)?.name} 
                            icon={Icons[modules.find(m => m.id === activeModule)?.icon]}
                            logos={logos}
                            principal="أحمد سالم الشهري"
                            preparer={{
                                title: isHealth ? (activeModule === 'gifted_plan' ? 'منسق الموهوبين' : 'الموجه الصحي') : 'معد الخطة',
                                name: isHealth ? 'علي إبراهيم عسيري' : 'لجنة التميز بالمدرسة'
                            }}
                        />
                    )}

                    <div className="md:hidden flex justify-between items-center p-4 mb-6 bg-white dark:bg-dark-800 rounded-xl shadow-sm border border-slate-200 dark:border-dark-700 mobile-header no-print">
                        <div><h1 className="font-bold text-lg text-slate-800 dark:text-white">الراشدون</h1><p className="text-xs text-slate-500">{modules.find(m => m.id === activeModule)?.name}</p></div>
                        <button onClick={() => setMobileMenuOpen(true)} className="p-2 bg-slate-100 dark:bg-dark-700 rounded-lg text-slate-600 dark:text-slate-300"><Icons.Menu size={24}/></button>
                    </div>

                    <div className="show-in-print hidden justify-between items-center mb-8 border-b-4 border-double border-black pb-4">
                        <div className="w-24 text-center">{logos.ministry && <img src={logos.ministry} className="w-20 mx-auto"/>}</div>
                        <div className="text-center">
                            <h2 className="font-bold">المملكة العربية السعودية - وزارة التعليم</h2>
                            <h3>ابتدائية ومتوسطة الراشدون بالمربع</h3>
                            <div className="bg-slate-800 text-white px-4 py-1 rounded mt-1 font-bold border-2 border-slate-900 print:bg-slate-800 print:text-white print:border-slate-900">{modules.find(m=>m.id===activeModule)?.name}</div>
                        </div>
                        <div className="w-24 text-center">{logos.vision && <img src={logos.vision} className="w-20 mx-auto"/>}</div>
                    </div>

                    <div className="flex flex-col md:flex-row justify-between items-center mb-6 no-print">
                        <div className="hidden md:block">
                            <h2 className="text-2xl font-black text-slate-800 dark:text-white">{modules.find(m=>m.id===activeModule)?.name}</h2>
                            <p className="text-sm text-slate-500">إدارة ومتابعة السجلات والخطط</p>
                        </div>
                        <div className="flex gap-2 w-full md:w-auto">
                            {activeModule !== 'health_record_final_v7' && activeModule !== 'sites_links' && activeModule !== 'students_db' && activeModule !== 'settings' && (
                                <button onClick={() => setPlanModalOpen(true)} className="flex-1 md:flex-none bg-emerald-600 text-white px-4 py-2 rounded-lg font-bold flex items-center justify-center gap-2 hover:bg-emerald-700"><Icons.Plus size={18}/> {planLabels.element}</button>
                            )}
                            <button onClick={() => window.print()} className="flex-1 md:flex-none bg-slate-800 text-white px-4 py-2 rounded-lg font-bold flex items-center justify-center gap-2 hover:bg-slate-900"><Icons.Printer size={18}/> طباعة</button>
                        </div>
                    </div>

                    {activeModule === 'settings' ? (
                        <div className="space-y-6 no-print">
                             <div className="bg-white dark:bg-dark-800 p-6 rounded-2xl shadow-sm">
                                 <h3 className="font-bold mb-4 dark:text-white">الشعارات</h3>
                                 <div className="grid grid-cols-3 gap-4">
                                     {['vision', 'ministry', 'seal'].map(k => <ImageUploader key={k} label={k} currentImage={logos[k]} onImageUpload={img => {const n={...logos,[k]:img}; setLogos(n); db.collection('school_data').doc('settings').set(n, {merge:true});}} />)}
                                 </div>
                             </div>

                             <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div className="bg-white dark:bg-dark-800 p-6 rounded-2xl shadow-sm">
                                    <h3 className="font-bold mb-4 dark:text-white">مسميات القائمة الجانبية</h3>
                                    <div className="space-y-3">
                                        {modules.filter(m => m.id !== 'settings').map(m => (
                                            <div key={m.id} className="flex items-center gap-2">
                                                <span className="text-slate-400"><Icons.Edit size={16}/></span>
                                                <input 
                                                    type="text" 
                                                    className="flex-1 bg-gray-50 dark:bg-dark-900 border rounded p-2 text-sm" 
                                                    value={m.name} 
                                                    onChange={(e) => setModules(prev => prev.map(pm => pm.id === m.id ? {...pm, name: e.target.value} : pm))}
                                                />
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <div className="bg-white dark:bg-dark-800 p-6 rounded-2xl shadow-sm">
                                    <h3 className="font-bold mb-4 dark:text-white">مصطلحات الخطط (الجداول)</h3>
                                    <div className="grid grid-cols-2 gap-3">
                                        {Object.keys(DEFAULT_PLAN_LABELS).map(key => (
                                            <div key={key}>
                                                <label className="text-[10px] text-gray-400 block mb-1">{DEFAULT_PLAN_LABELS[key]}</label>
                                                <input 
                                                    type="text" 
                                                    className="w-full bg-gray-50 dark:bg-dark-900 border rounded p-2 text-sm font-bold" 
                                                    value={planLabels[key]} 
                                                    onChange={(e) => setPlanLabels(prev => ({...prev, [key]: e.target.value}))}
                                                />
                                            </div>
                                        ))}
                                    </div>
                                </div>
                             </div>

                             <div className="flex justify-end">
                                <button onClick={saveModuleTitles} className="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold shadow-lg hover:bg-blue-700 flex items-center gap-2"><Icons.Save size={20}/> حفظ جميع الإعدادات</button>
                             </div>
                             
                             <div className="bg-red-50 dark:bg-red-900/20 p-6 rounded-2xl shadow-sm border border-red-200 dark:border-red-900">
                                <h3 className="font-bold mb-4 text-red-700 dark:text-red-400 flex items-center gap-2"><Icons.Alert size={20}/> منطقة الخطر (إدارة البيانات)</h3>
                                <div className="flex flex-col md:flex-row gap-4">
                                    <button onClick={clearClinicData} className="bg-red-600 text-white px-4 py-3 rounded-lg font-bold hover:bg-red-700 flex-1">مسح جميع سجلات العيادة</button>
                                    <button onClick={clearStudentsData} className="bg-red-600 text-white px-4 py-3 rounded-lg font-bold hover:bg-red-700 flex-1">مسح قاعدة بيانات الطلاب</button>
                                </div>
                             </div>
                        </div>
                    ) : activeModule === 'students_db' ? (
                        <StudentsDB students={dataStore['students_db'] || []} onSaveStudents={d => saveData('students_db', d)} showToast={showToast} />
                    ) : activeModule === 'health_record_final_v7' ? (
                        <HealthClinicView 
                            records={dataStore['health_record_final_v7'] || []} 
                            studentsDB={dataStore['students_db'] || []}
                            onSaveRecord={r => { const curr = dataStore['health_record_final_v7'] || []; const exist = curr.findIndex(x=>x.id===r.id); saveData('health_record_final_v7', exist>=0 ? curr.map(x=>x.id===r.id?r:x) : [r,...curr]); }}
                            onUpdateRecord={updateClinicRecord}
                            onDeleteRecord={id => saveData('health_record_final_v7', dataStore['health_record_final_v7'].filter(x=>x.id!==id))}
                            onOpenReferral={setReferralData}
                            onOpenBMI={()=>setBmiOpen(true)}
                            showToast={showToast}
                        />
                    ) : activeModule === 'sites_links' ? (
                        <SitesLinksView data={dataStore['sites_links'] || []} onSave={(newData) => saveData('sites_links', newData)} />
                    ) : (
                        <div className="space-y-4">
                             {stats && (
                                <>
                                {/* البطاقات الملونة (تظهر في الشاشة فقط) */}
                                <div className="grid grid-cols-1 md:grid-cols-5 gap-4 no-print fade-in">
                                    <div className="md:col-span-4 grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4">
                                        <DashboardCard title="إجمالي" value={stats.total} gradient="bg-gradient-to-br from-slate-700 to-slate-900" icon={Icons.Dashboard} />
                                        <DashboardCard title="منجز" value={stats.done} gradient="bg-gradient-to-br from-emerald-500 to-teal-600" icon={Icons.CheckCircle} />
                                        <DashboardCard title="جاري" value={stats.inProgress} gradient="bg-gradient-to-br from-blue-500 to-indigo-600" icon={Icons.Improvement} /> 
                                        <DashboardCard title="لم تبدأ" value={stats.pending} gradient="bg-gradient-to-br from-red-500 to-rose-600" icon={Icons.Alert} />
                                        <div className="p-5 rounded-2xl shadow-lg bg-slate-700 text-white flex items-center justify-between col-span-2 md:col-span-1 lg:col-span-1">
                                            <div><p className="text-white/80 text-xs font-bold mb-1">نسبة الإنجاز</p><h4 className="text-4xl font-black">{stats.percent}%</h4></div>
                                            <div className="p-3 rounded-xl bg-white/20"><Icons.Target size={28}/></div>
                                        </div>
                                    </div>
                                    <div className="md:col-span-1">
                                        <ChartsSection plans={dataStore[activeModule] || []} />
                                    </div>
                                </div>

                                {/* ملخص الإحصائيات (يظهر في الطباعة فقط) */}
                                <div className="hidden show-in-print print-stats-summary">
                                    <div className="flex-1">
                                         <h3 className="font-bold text-xl mb-2">ملخص الإنجاز</h3>
                                         <div className="grid grid-cols-2 gap-4 text-sm font-bold">
                                             <div>المجموع: {stats.total}</div>
                                             <div>المنجز: {stats.done}</div>
                                             <div>الجاري: {stats.inProgress}</div>
                                             <div>لم يبدأ: {stats.pending}</div>
                                         </div>
                                    </div>
                                    <div className="text-center mx-8">
                                         <div className="text-sm font-bold mb-1">نسبة الإنجاز العام</div>
                                         <div className="text-4xl font-black">{stats.percent}%</div>
                                    </div>
                                    <div className="w-32 h-32 chart-print-view">
                                         <ChartsSection plans={dataStore[activeModule] || []} isPrintMode={true} />
                                    </div>
                                </div>
                                </>
                             )}

                             {(dataStore[activeModule] || []).map(p => (
                                 <div key={p.id} className="print-card bg-white dark:bg-dark-800 p-4 rounded-xl border dark:border-dark-700 shadow-sm">
                                     <div className="flex justify-between items-center mb-4 border-b pb-2">
                                         <div className="flex gap-2 items-center flex-1">
                                             <button onClick={()=>{
                                                 const el = document.getElementById(`plan-${p.id}`);
                                                 if(el) el.classList.toggle('hidden');
                                             }} className="p-1 text-slate-400 hover:text-blue-500 transition-colors"><Icons.Down size={20}/></button>
                                             
                                             <div className="cursor-pointer flex flex-col gap-1 flex-1">
                                                 <div className="text-xs text-blue-600 bg-blue-50 px-2 rounded w-fit">
                                                     <EditableText value={p.domain} onChange={v=>updatePlan(p.id, 'domain', v)} className="font-normal" />
                                                 </div>
                                                 <div className="font-bold text-lg dark:text-white">
                                                     <EditableText value={p.element} onChange={v=>updatePlan(p.id, 'element', v)} className="font-bold" />
                                                 </div>
                                             </div>
                                         </div>

                                         <div className="flex gap-3 items-center">
                                             <div className={`font-black text-2xl ${getProgressColor(p.progress)}`}>{p.progress}%</div>
                                             <button onClick={()=>deletePlan(p.id)} className="text-red-400 no-print"><Icons.Trash/></button>
                                         </div>
                                     </div>
                                     <div id={`plan-${p.id}`} className="block">
                                         <table className="w-full text-sm text-right">
                                             <thead><tr>
                                                 <th>{planLabels.procedure}</th>
                                                 <th>{planLabels.responsible}</th>
                                                 <th>{planLabels.deadline}</th>
                                                 <th>{planLabels.witness}</th>
                                                 <th>الحالة</th>
                                             </tr></thead>
                                             <tbody>{p.procedures?.map(pr=><tr key={pr.id} className="border-b dark:border-dark-700">
                                                 <td className="p-2 dark:text-gray-300"><EditableText value={pr.text} onChange={v=>updateProc(p.id, pr.id, 'text', v)}/></td>
                                                 <td className="p-2"><EditableText value={pr.responsible} onChange={v=>updateProc(p.id, pr.id, 'responsible', v)}/></td>
                                                 <td className="p-2"><EditableText value={pr.deadline} onChange={v=>updateProc(p.id, pr.id, 'deadline', v)} placeholder="-"/></td>
                                                 <td className="p-2 h-16 w-16"><WitnessCell link={pr.witnessLink} onChange={v=>updateProc(p.id, pr.id, 'witnessLink', v)} /></td>
                                                 <td className="p-2 flex items-center gap-2"><Badge status={pr.status} onClick={()=>toggleProcStatus(p.id, pr.id)} /><button onClick={()=>deleteProc(p.id, pr.id)} className="text-red-400 no-print"><Icons.Trash size={14}/></button></td>
                                             </tr>)}</tbody>
                                         </table>
                                         <button onClick={()=>addProc(p.id)} className="w-full mt-2 py-1 border border-dashed text-slate-400 text-xs no-print hover:text-emerald-500">إضافة {planLabels.procedure}</button>
                                     </div>
                                 </div>
                             ))}
                          </div>
                    )}

                    <div className="print-footer show-in-print justify-between mt-8 pt-4 border-t border-gray-400 break-inside-avoid">
                        <div className="text-center w-1/3">
                            <p className="font-bold">{isHealth ? (activeModule === 'gifted_plan' ? 'منسق الموهوبين' : 'الموجه الصحي') : 'معد الخطة'}</p>
                            <p>{isHealth ? 'علي إبراهيم عسيري' : 'لجنة التميز بالمدرسة'}</p>
                        </div>
                        <div className="text-center w-1/3"><p className="font-bold">الختم</p>{logos.seal && <img src={logos.seal} className="w-16 mx-auto opacity-70"/>}</div>
                        <div className="text-center w-1/3"><p className="font-bold">مدير المدرسة</p><p>أحمد سالم الشهري</p></div>
                    </div>
                </main>
            </div>
        );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>
</body>
</html>
